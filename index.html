<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engenharia de Produto - Grist</title>
    <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #eef2f5; color: #333; }
        .container { background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 850px; margin: 0 auto; }
        h2, h3 { color: #2c3e50; border-bottom: 2px solid #ecf0f1; padding-bottom: 5px; margin-bottom: 15px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input[type="text"], input[type="number"], select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        .variacao-grid { display: grid; grid-template-columns: 50px 1fr; gap: 10px; align-items: center; margin-bottom: 10px; background: #f8f9fa; padding: 10px; border-radius: 4px; border-left: 4px solid #3498db; }
        
        .ingrediente-row { display: grid; grid-template-columns: 2fr 1fr 1fr 60px auto; gap: 10px; margin-bottom: 10px; align-items: end; background: #fdfbf7; padding: 10px; border: 1px solid #e1d8c1; border-radius: 4px; }
        
        button.btn-add { background: #3498db; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; margin-bottom: 20px; }
        button.btn-add:hover { background: #2980b9; }
        button.btn-remove { background: #e74c3c; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; }
        button.btn-submit { background: #27ae60; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 20px; }
        button.btn-submit:hover { background: #219653; }
        button:disabled { background: #95a5a6; cursor: not-allowed; }
        
        input.ing-unidade, input.readonly-field { background-color: #e9ecef; color: #495057; text-align: center; cursor: not-allowed; font-weight: bold; }
        select.readonly-field { background-color: #e9ecef; color: #495057; cursor: not-allowed; }

        .info-text { font-size: 12px; color: #666; margin-top: -10px; margin-bottom: 15px; }
        #status-loading { color: #e67e22; font-weight: bold; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Lançamento Estruturado de Produto</h2>
    
    <div id="status-loading">Sincronizando com o banco de dados... aguarde.</div>

    <form id="form-produtos" style="display: none;">
        
        <datalist id="lista-filiais"></datalist>
        <datalist id="lista-insumos"></datalist>
        <datalist id="lista-receitas"></datalist>

        <div class="form-group">
            <label>Filial:</label>
            <input type="text" id="filial" list="lista-filiais" required placeholder="Selecione a filial">
        </div>

        <div class="form-group" style="display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px;">
            <div>
                <label>Nome da Receita Base:</label>
                <input type="text" id="nome_receita" list="lista-receitas" required placeholder="Selecione ou crie nova" oninput="verificarReceitaExistente()">
            </div>
            <div>
                <label>Rend. Total (Ex: 1000):</label>
                <input type="number" id="rendimento_receita" step="0.01" required placeholder="Qtd">
            </div>
            <div>
                <label>Unidade:</label>
                <select id="unidade_receita" required>
                    <option value="g">g</option>
                    <option value="kg">kg</option>
                    <option value="ml">ml</option>
                    <option value="L">L</option>
                    <option value="UN">UN</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>Nome Final do Produto (Ex: BOLO ALFAJOR):</label>
            <input type="text" id="produto_base" required placeholder="Gerará: BOLO ALFAJOR P, etc.">
        </div>

        <h3>1. Composição da Ficha Técnica</h3>
        <p class="info-text">Insira os ingredientes da Receita Base e verifique a unidade de medida correta.</p>
        
        <div id="lista-ingredientes-container"></div>
        <button type="button" class="btn-add" onclick="adicionarLinhaIngrediente()">+ Adicionar Insumo/Sub-receita</button>

        <h3>2. Criação dos Produtos</h3>
        <p class="info-text">Selecione o rendimento. O preço é calculado automaticamente pelo Grist.</p>
        
        <!-- P -->
        <div class="variacao-grid">
            <div><input type="checkbox" id="chk_P" value="P"> <label for="chk_P">P</label></div>
            <div>
                <label>Rendimento</label>
                <select id="fator_P">
                    <option value="1">Rende 1 un. (Fator 1.0)</option>
                    <option value="0.66">Rende 1,5 un. (Fator 0.66)</option>
                    <option value="0.5">Rende 2 un. (Fator 0.5)</option>
                    <option value="0.33">Rende 3 un. (Fator 0.33)</option>
                    <option value="0.25">Rende 4 un. (Fator 0.25)</option>
                    <option value="0.2">Rende 5 un. (Fator 0.2)</option>
                </select>
            </div>
        </div>
        
        <!-- M -->
        <div class="variacao-grid">
            <div><input type="checkbox" id="chk_M" value="M"> <label for="chk_M">M</label></div>
            <div>
                <label>Rendimento</label>
                <select id="fator_M">
                    <option value="1">Rende 1 un. (Fator 1.0)</option>
                    <option value="0.66">Rende 1,5 un. (Fator 0.66)</option>
                    <option value="0.5">Rende 2 un. (Fator 0.5)</option>
                    <option value="0.33">Rende 3 un. (Fator 0.33)</option>
                    <option value="0.25">Rende 4 un. (Fator 0.25)</option>
                    <option value="0.2">Rende 5 un. (Fator 0.2)</option>
                </select>
            </div>
        </div>

        <!-- G -->
        <div class="variacao-grid">
            <div><input type="checkbox" id="chk_G" value="G"> <label for="chk_G">G</label></div>
            <div>
                <label>Rendimento</label>
                <select id="fator_G">
                    <option value="1">Rende 1 un. (Fator 1.0)</option>
                    <option value="0.66">Rende 1,5 un. (Fator 0.66)</option>
                    <option value="0.5">Rende 2 un. (Fator 0.5)</option>
                    <option value="0.33">Rende 3 un. (Fator 0.33)</option>
                    <option value="0.25">Rende 4 un. (Fator 0.25)</option>
                    <option value="0.2">Rende 5 un. (Fator 0.2)</option>
                </select>
            </div>
        </div>

        <button type="submit" class="btn-submit">Processar Cadastro Completo</button>
    </form>
</div>

<script>
    grist.ready({ requiredAccess: 'full' });

    // Dicionários para unidades e Autofill
    const mapaUnidades = { 'Insumo': {}, 'Sub_Receita': {} };
    const dadosReceitasBase = {};
    
    // NOVO: Dicionário Mestre de IDs para Referências
    const mapaIds = {
        'Filiais': {},
        'Insumos': {},
        'Receitas': {}
    };

    async function carregarDadosDoBanco() {
        try {
            const filiaisData = await grist.docApi.fetchTable('Filiais');
            const insumosData = await grist.docApi.fetchTable('Insumos');
            // Corrigido: Agora puxa estritamente de 'Cadastro_de_Receitas'
            const receitasData = await grist.docApi.fetchTable('Cadastro_de_Receitas'); 

            // Preenche Filiais e salva o ID
            const datalistFiliais = document.getElementById('lista-filiais');
            if(filiaisData.id) {
                const colNomesFiliais = filiaisData.Nome || filiaisData.Filial || filiaisData.id;
                colNomesFiliais.forEach((nome, index) => { 
                    mapaIds['Filiais'][nome] = filiaisData.id[index];
                    datalistFiliais.innerHTML += `<option value="${nome}">`; 
                });
            }

            // Preenche Insumos, Unidades e mapeia IDs
            const datalistInsumos = document.getElementById('lista-insumos');
            if(insumosData.Nome) {
                insumosData.Nome.forEach((nome, index) => { 
                    mapaIds['Insumos'][nome] = insumosData.id[index];
                    datalistInsumos.innerHTML += `<option value="${nome}">`; 
                    if(insumosData.Unidade) {
                        mapaUnidades['Insumo'][nome] = insumosData.Unidade[index];
                    }
                });
            }

            // Preenche Receitas, Unidades e mapeia IDs
            const datalistReceitas = document.getElementById('lista-receitas');
            if(receitasData.Nome_da_Receita) {
                receitasData.Nome_da_Receita.forEach((nome, index) => { 
                    mapaIds['Receitas'][nome] = receitasData.id[index];
                    datalistReceitas.innerHTML += `<option value="${nome}">`; 
                    
                    let und = receitasData.Unidade ? receitasData.Unidade[index] : '';
                    let rend = receitasData.Rendimento_Total ? receitasData.Rendimento_Total[index] : ''; 

                    if(und) mapaUnidades['Sub_Receita'][nome] = und;
                    dadosReceitasBase[nome] = { unidade: und, rendimento: rend };
                });
            }

            document.getElementById('status-loading').style.display = 'none';
            document.getElementById('form-produtos').style.display = 'block';

        } catch (error) {
            console.error("Erro ao carregar dados do Grist:", error);
            document.getElementById('status-loading').innerText = "Erro ao ler banco de dados: " + error.message;
            document.getElementById('status-loading').style.color = "red";
        }
    }

    carregarDadosDoBanco();

    function verificarReceitaExistente() {
        const nomeReceita = document.getElementById('nome_receita').value;
        const inputRend = document.getElementById('rendimento_receita');
        const selectUnd = document.getElementById('unidade_receita');

        if (dadosReceitasBase[nomeReceita]) {
            inputRend.value = dadosReceitasBase[nomeReceita].rendimento;
            selectUnd.value = dadosReceitasBase[nomeReceita].unidade;
            
            inputRend.readOnly = true;
            inputRend.classList.add('readonly-field');
            selectUnd.disabled = true;
            selectUnd.classList.add('readonly-field');
        } else {
            if (inputRend.readOnly) {
                inputRend.value = '';
                inputRend.readOnly = false;
                inputRend.classList.remove('readonly-field');
                
                selectUnd.disabled = false;
                selectUnd.classList.remove('readonly-field');
            }
        }
    }

    function adicionarLinhaIngrediente() {
        const container = document.getElementById('lista-ingredientes-container');
        const idLinha = Date.now();
        
        const div = document.createElement('div');
        div.className = 'ingrediente-row';
        div.id = `ingrediente-${idLinha}`;
        
        div.innerHTML = `
            <div>
                <label>Insumo ou Sub-receita</label>
                <input type="text" class="ing-nome" list="lista-insumos" required placeholder="Digite para buscar..." oninput="atualizarUnidade(${idLinha})">
            </div>
            <div>
                <label>Tipo</label>
                <select class="ing-tipo" onchange="atualizarDatalist(this, ${idLinha})">
                    <option value="Insumo">Insumo</option>
                    <option value="Sub_Receita">Sub-receita</option>
                </select>
            </div>
            <div>
                <label>Quantidade</label>
                <input type="number" class="ing-qtd" step="0.01" required placeholder="Ex: 140">
            </div>
            <div>
                <label>Unid.</label>
                <input type="text" class="ing-unidade" tabindex="-1" readonly placeholder="-">
            </div>
            <div>
                <button type="button" class="btn-remove" onclick="removerLinha(${idLinha})">X</button>
            </div>
        `;
        container.appendChild(div);
    }

    function atualizarDatalist(selectElement, idLinha) {
        const inputNome = document.querySelector(`#ingrediente-${idLinha} .ing-nome`);
        if (selectElement.value === 'Insumo') {
            inputNome.setAttribute('list', 'lista-insumos');
        } else {
            inputNome.setAttribute('list', 'lista-receitas');
        }
        inputNome.value = ""; 
        atualizarUnidade(idLinha);
    }

    function atualizarUnidade(idLinha) {
        const linha = document.getElementById(`ingrediente-${idLinha}`);
        if(!linha) return;

        const nomeSelecionado = linha.querySelector('.ing-nome').value;
        const tipoSelecionado = linha.querySelector('.ing-tipo').value;
        const inputUnidade = linha.querySelector('.ing-unidade');

        const unidade = mapaUnidades[tipoSelecionado][nomeSelecionado] || '-';
        inputUnidade.value = unidade;
    }

    function removerLinha(id) {
        document.getElementById(`ingrediente-${id}`).remove();
    }

    document.getElementById('form-produtos').addEventListener('submit', async function(e) {
        e.preventDefault();

        const filialNome = document.getElementById('filial').value;
        const nomeReceita = document.getElementById('nome_receita').value;
        const rendimentoReceita = parseFloat(document.getElementById('rendimento_receita').value);
        const unidadeReceita = document.getElementById('unidade_receita').value;
        const produtoBase = document.getElementById('produto_base').value;
        const btnSubmit = document.querySelector('.btn-submit');
        
        try {
            // Validação de segurança: Verifica se a filial selecionada existe no mapa
            const idFilial = mapaIds['Filiais'][filialNome];
            if (!idFilial) {
                alert('Filial não encontrada. Por favor, selecione uma filial válida da lista.');
                return;
            }

            btnSubmit.innerText = 'Processando...';
            btnSubmit.disabled = true;
            
            // 1. Processar Cadastro da Receita Base
            let idReceita = mapaIds['Receitas'][nomeReceita];
            if (!idReceita) {
                // Corrigido: Cadastro na tabela 'Cadastro_de_Receitas'
                const resultReceita = await grist.docApi.applyUserActions([
                    ['AddRecord', 'Cadastro_de_Receitas', null, {
                        'Nome_da_Receita': nomeReceita,
                        'Rendimento_Total': rendimentoReceita, 
                        'Unidade': unidadeReceita
                    }]
                ]);
                idReceita = resultReceita[0]; // Pega o ID numérico da nova linha
                mapaIds['Receitas'][nomeReceita] = idReceita; // Salva no mapa para uso futuro
            }

            // 2. Processar Ingredientes (Composição)
            const acoesIngredientes = [];
            const linhasIngredientes = document.querySelectorAll('.ingrediente-row');
            
            for(let linha of linhasIngredientes) {
                const nomeIng = linha.querySelector('.ing-nome').value;
                const tipo = linha.querySelector('.ing-tipo').value;
                const qtd = parseFloat(linha.querySelector('.ing-qtd').value);

                // Em colunas de referência enviamos sempre o ID gerado, não o texto
                let camposComposicao = { 'ID_Nome': idReceita };

                if (tipo === 'Insumo') {
                    const idInsumo = mapaIds['Insumos'][nomeIng];
                    if(!idInsumo) throw new Error(`Insumo '${nomeIng}' não existe no sistema. Crie-o primeiro.`);
                    camposComposicao['Insumo'] = idInsumo;
                    camposComposicao['Quantidade'] = qtd;
                } else {
                    const idSubReceita = mapaIds['Receitas'][nomeIng];
                    if(!idSubReceita) throw new Error(`Sub-receita '${nomeIng}' não existe no sistema. Crie-a primeiro.`);
                    camposComposicao['Sub_Receita'] = idSubReceita;
                    camposComposicao['Quantidade'] = qtd; 
                }

                acoesIngredientes.push(['AddRecord', 'Composicao_Receita', null, camposComposicao]);
            };

            if (acoesIngredientes.length > 0) {
                await grist.docApi.applyUserActions(acoesIngredientes);
            }

            // 3. Processar Produtos e em seguida o Catálogo
            const acoesProdutos = [];
            const configsCatalogo = []; 
            const tamanhos = ['P', 'M', 'G'];
            let adicionouTamanho = false;
            
            tamanhos.forEach(tamanho => {
                if (document.getElementById(`chk_${tamanho}`).checked) {
                    adicionouTamanho = true;
                    const fatorRendimento = parseFloat(document.getElementById(`fator_${tamanho}`).value);
                    
                    const nomeFinalProduto = `${produtoBase} ${tamanho}`;

                    let tamanhoFormatado = '';
                    if(tamanho === 'G') tamanhoFormatado = 'G (450g)';
                    else if(tamanho === 'M') tamanhoFormatado = 'M (350g)';
                    else if(tamanho === 'P') tamanhoFormatado = 'P (230g)';

                    acoesProdutos.push(['AddRecord', 'Produtos', null, {
                        'Nome': nomeFinalProduto,
                        'Receita': idReceita, // Link de Referência por ID
                        'Fator_de_Rendimento': fatorRendimento
                    }]);

                    configsCatalogo.push({ tamanhoFormatado: tamanhoFormatado });
                }
            });

            if (!adicionouTamanho || linhasIngredientes.length === 0) { 
                alert('Adicione pelo menos um tamanho e um ingrediente!');
                btnSubmit.innerText = 'Processar Cadastro Completo';
                btnSubmit.disabled = false;
                return;
            }

            // Cria Produtos e pega os IDs criados de volta
            const idsProdutosCriados = await grist.docApi.applyUserActions(acoesProdutos);
            
            // 4. Cria vínculos no Catálogo Filial com os IDs corretos
            const acoesCatalogo = [];
            idsProdutosCriados.forEach((idProduto, index) => {
                acoesCatalogo.push(['AddRecord', 'Catalogo_Filial', null, {
                    'Filial': idFilial,      // Link de Referência da Filial (ID)
                    'Produto': idProduto,    // Link de Referência do Produto (ID)
                    'Categoria': 'Encomendas',
                    'Tamanho': configsCatalogo[index].tamanhoFormatado
                }]);
            });

            await grist.docApi.applyUserActions(acoesCatalogo);
            
            alert('Cadastro efetuado com sucesso!');
            document.getElementById('form-produtos').reset();
            
            document.getElementById('rendimento_receita').readOnly = false;
            document.getElementById('rendimento_receita').classList.remove('readonly-field');
            document.getElementById('unidade_receita').disabled = false;
            document.getElementById('unidade_receita').classList.remove('readonly-field');

            document.getElementById('lista-ingredientes-container').innerHTML = '';
            adicionarLinhaIngrediente(); 

        } catch (error) {
            console.error(error);
            alert('Erro ao salvar no Grist: ' + error.message);
        } finally {
            btnSubmit.innerText = 'Processar Cadastro Completo';
            btnSubmit.disabled = false;
        }
    });

    adicionarLinhaIngrediente();
</script>

</body>
</html>
